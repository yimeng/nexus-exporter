# Nexus Exporter Configuration
# This file should be owned by root with permissions 600

# Required: Nexus password
NEXUS_PASSWORD=your-nexus-password

# Optional: Nexus URL (default: http://localhost:8081)
# NEXUS_URL=http://localhost:8081

# Optional: Nexus username (default: admin)
# NEXUS_USERNAME=admin

# Optional: Exporter port (default: 8082)
# EXPORTER_PORT=8082

# Optional: Skip TLS verification (default: false)
# NEXUS_INSECURE=false

# Optional: Log level (default: info)
# LOG_LEVEL=info
