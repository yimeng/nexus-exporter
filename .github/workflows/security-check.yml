name: Security Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Secret Detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Check for sensitive patterns
        run: |
          echo "Checking for sensitive patterns..."
          
          # Check for common secrets (exclude README.md as it contains examples)
          found=0
          
          # Check for password assignments in code files only (not docs)
          if grep -riE "password[[:space:]]*=[[:space:]]*['\"][^'\"]+['\"]" --include="*.go" --include="*.yaml" --include="*.yml" --include="*.json" . 2>/dev/null | grep -v ".git/" | grep -v "vendor/" | grep -v "//" | grep -v "your-" | grep -v "example" | grep -v "placeholder"; then
            echo "⚠️  Potential password found"
            found=1
          fi
          
          # Check for private keys
          if grep -ri "BEGIN.*PRIVATE KEY" --include="*.go" --include="*.yaml" --include="*.yml" --include="*.json" . 2>/dev/null | grep -v ".git/" | grep -v "vendor/"; then
            echo "⚠️  Potential private key found"
            found=1
          fi
          
          # Check for API keys/tokens (basic patterns, exclude docs)
          if grep -riE "api[_-]?key[[:space:]]*=[[:space:]]*['\"][^'\"]{8,}['\"]" --include="*.go" --include="*.yaml" --include="*.yml" --include="*.json" . 2>/dev/null | grep -v ".git/" | grep -v "vendor/" | grep -v "your-" | grep -v "example"; then
            echo "⚠️  Potential API key found"
            found=1
          fi
          
          if [ $found -eq 1 ]; then
            echo "❌ Sensitive information detected! Please review and remove."
            exit 1
          fi
          
          echo "✅ No sensitive patterns found"

      - name: Check for hardcoded credentials
        run: |
          echo "Checking for hardcoded credentials..."
          
          # Check for common credential patterns
          if grep -rE "(admin|root|user|login).{0,10}(password|pass|pwd).{0,5}=.{0,20}[\"'][^\"']{4,}[\"']" \
            --include="*.go" --include="*.yaml" --include="*.yml" --include="*.json" . 2>/dev/null | grep -v ".git/" | grep -v "vendor/"; then
            echo "⚠️  Potential hardcoded credentials found!"
            exit 1
          fi
          
          echo "✅ No hardcoded credentials found"

      - name: Check .gitignore
        run: |
          echo "Checking .gitignore..."
          
          required_patterns=(
            ".env"
            "*.pem"
            "*.key"
            "secrets/"
            ".kimi"
          )
          
          for pattern in "${required_patterns[@]}"; do
            if ! grep -q "$pattern" .gitignore 2>/dev/null; then
              echo "⚠️  Required pattern '$pattern' not found in .gitignore"
              exit 1
            fi
          done
          
          echo "✅ .gitignore is properly configured"
